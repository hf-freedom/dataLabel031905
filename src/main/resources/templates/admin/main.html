<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>管理后台 - 数据标注系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f5f5; }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 20px; }
        .header .user-info { display: flex; align-items: center; gap: 15px; }
        .header .logout-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
        }
        .container { display: flex; min-height: calc(100vh - 60px); }
        .sidebar {
            width: 200px;
            background: white;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        .sidebar ul { list-style: none; }
        .sidebar li {
            padding: 15px 20px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
            transition: background 0.3s;
        }
        .sidebar li:hover, .sidebar li.active {
            background: #f0f0ff;
            color: #667eea;
        }
        .main-content {
            flex: 1;
            padding: 20px;
        }
        .page { display: none; }
        .page.active { display: block; }
        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .card h3 { margin-bottom: 15px; color: #333; }
        .toolbar { margin-bottom: 15px; }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-success { background: #27ae60; color: white; }
        .btn-warning { background: #f39c12; color: white; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 8px;
            width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-content.wide { width: 650px; }
        .modal-content h3 { margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #555; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .modal-actions { margin-top: 20px; text-align: right; }
        .modal-actions .btn { margin-left: 10px; }
        .checkbox-group {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 10px;
        }
        .checkbox-item {
            padding: 8px 5px;
            border-bottom: 1px solid #eee;
        }
        .checkbox-item:last-child { border-bottom: none; }
        .checkbox-item input { margin-right: 8px; }
        .checkbox-item label { cursor: pointer; }
        .status-tag {
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 12px;
        }
        .status-enabled { background: #d4edda; color: #155724; }
        .status-disabled { background: #f8d7da; color: #721c24; }
        .menu-type-tag {
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 12px;
        }
        .menu-type-menu { background: #cce5ff; color: #004085; }
        .menu-type-button { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
    <div class="header">
        <h1>数据标注系统 - 管理后台</h1>
        <div class="user-info">
            <span id="currentUserName">管理员</span>
            <a href="/logout" class="logout-btn">退出登录</a>
        </div>
    </div>
    <div class="container">
        <div class="sidebar">
            <ul>
                <li class="active" data-page="user">用户管理</li>
                <li data-page="role">角色管理</li>
                <li data-page="org">组织机构</li>
                <li data-page="menu">菜单管理</li>
                <li data-page="api">API权限</li>
            </ul>
        </div>
        <div class="main-content">
            <div id="userPage" class="page active">
                <div class="card">
                    <h3>用户管理</h3>
                    <div class="toolbar">
                        <button class="btn btn-primary" onclick="showUserModal()">新增用户</button>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>用户名</th>
                                <th>姓名</th>
                                <th>邮箱</th>
                                <th>电话</th>
                                <th>类型</th>
                                <th>角色</th>
                                <th>组织机构</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="userTable"></tbody>
                    </table>
                </div>
            </div>
            <div id="rolePage" class="page">
                <div class="card">
                    <h3>角色管理</h3>
                    <div class="toolbar">
                        <button class="btn btn-primary" onclick="showRoleModal()">新增角色</button>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>角色名称</th>
                                <th>角色编码</th>
                                <th>描述</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="roleTable"></tbody>
                    </table>
                </div>
            </div>
            <div id="orgPage" class="page">
                <div class="card">
                    <h3>组织机构管理</h3>
                    <div class="toolbar">
                        <button class="btn btn-primary" onclick="showOrgModal()">新增机构</button>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>机构名称</th>
                                <th>机构编码</th>
                                <th>层级</th>
                                <th>描述</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="orgTable"></tbody>
                    </table>
                </div>
            </div>
            <div id="menuPage" class="page">
                <div class="card">
                    <h3>菜单管理</h3>
                    <div class="toolbar">
                        <button class="btn btn-primary" onclick="showMenuModal()">新增菜单</button>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>菜单名称</th>
                                <th>菜单编码</th>
                                <th>路径</th>
                                <th>类型</th>
                                <th>排序</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="menuTable"></tbody>
                    </table>
                </div>
            </div>
            <div id="apiPage" class="page">
                <div class="card">
                    <h3>API权限管理</h3>
                    <div class="toolbar">
                        <button class="btn btn-primary" onclick="showApiModal()">新增API权限</button>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>权限名称</th>
                                <th>权限编码</th>
                                <th>URL</th>
                                <th>请求方法</th>
                                <th>所属菜单</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="apiTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="userModal" class="modal">
        <div class="modal-content">
            <h3 id="userModalTitle">新增用户</h3>
            <input type="hidden" id="userId">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="userUsername">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="userPassword" placeholder="留空则不修改">
            </div>
            <div class="form-group">
                <label>姓名</label>
                <input type="text" id="userRealName">
            </div>
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="userEmail">
            </div>
            <div class="form-group">
                <label>电话</label>
                <input type="text" id="userPhone">
            </div>
            <div class="form-group">
                <label>用户类型</label>
                <select id="userTypeSelect">
                    <option value="0">普通用户</option>
                    <option value="1">管理员</option>
                </select>
            </div>
            <div class="form-group">
                <label>绑定角色</label>
                <select id="userRole"></select>
            </div>
            <div class="form-group">
                <label>绑定组织机构</label>
                <select id="userOrg"></select>
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('userModal')">取消</button>
                <button class="btn btn-primary" onclick="saveUser()">保存</button>
            </div>
        </div>
    </div>

    <div id="roleModal" class="modal">
        <div class="modal-content">
            <h3 id="roleModalTitle">新增角色</h3>
            <input type="hidden" id="roleId">
            <div class="form-group">
                <label>角色名称</label>
                <input type="text" id="roleName">
            </div>
            <div class="form-group">
                <label>角色编码</label>
                <input type="text" id="roleCode">
            </div>
            <div class="form-group">
                <label>描述</label>
                <textarea id="roleDesc" rows="3"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('roleModal')">取消</button>
                <button class="btn btn-primary" onclick="saveRole()">保存</button>
            </div>
        </div>
    </div>

    <div id="roleBindModal" class="modal">
        <div class="modal-content wide">
            <h3 id="roleBindModalTitle">角色权限绑定</h3>
            <input type="hidden" id="roleBindId">
            <div class="form-group">
                <label id="roleBindName"></label>
            </div>
            <div class="form-group">
                <label>绑定菜单</label>
                <div class="checkbox-group" id="menuCheckboxGroup"></div>
            </div>
            <div class="form-group">
                <label>绑定API权限</label>
                <div class="checkbox-group" id="apiCheckboxGroup"></div>
            </div>
            <div class="form-group">
                <label>绑定组织机构</label>
                <div class="checkbox-group" id="orgCheckboxGroup"></div>
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('roleBindModal')">取消</button>
                <button class="btn btn-primary" onclick="saveRoleBind()">保存</button>
            </div>
        </div>
    </div>

    <div id="orgModal" class="modal">
        <div class="modal-content">
            <h3 id="orgModalTitle">新增机构</h3>
            <input type="hidden" id="orgId">
            <div class="form-group">
                <label>机构名称</label>
                <input type="text" id="orgName">
            </div>
            <div class="form-group">
                <label>机构编码</label>
                <input type="text" id="orgCode">
            </div>
            <div class="form-group">
                <label>上级机构</label>
                <select id="orgParent"></select>
            </div>
            <div class="form-group">
                <label>描述</label>
                <textarea id="orgDesc" rows="3"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('orgModal')">取消</button>
                <button class="btn btn-primary" onclick="saveOrg()">保存</button>
            </div>
        </div>
    </div>

    <div id="menuModal" class="modal">
        <div class="modal-content">
            <h3 id="menuModalTitle">新增菜单</h3>
            <input type="hidden" id="menuId">
            <div class="form-group">
                <label>菜单名称</label>
                <input type="text" id="menuName">
            </div>
            <div class="form-group">
                <label>菜单编码</label>
                <input type="text" id="menuCode">
            </div>
            <div class="form-group">
                <label>路径</label>
                <input type="text" id="menuPath">
            </div>
            <div class="form-group">
                <label>上级菜单</label>
                <select id="menuParent"></select>
            </div>
            <div class="form-group">
                <label>菜单类型</label>
                <select id="menuType">
                    <option value="0">菜单</option>
                    <option value="1">按钮</option>
                </select>
            </div>
            <div class="form-group">
                <label>图标</label>
                <input type="text" id="menuIcon">
            </div>
            <div class="form-group">
                <label>排序</label>
                <input type="number" id="menuSort" value="0">
            </div>
            <div class="form-group">
                <label>状态</label>
                <select id="menuStatus">
                    <option value="1">启用</option>
                    <option value="0">禁用</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('menuModal')">取消</button>
                <button class="btn btn-primary" onclick="saveMenu()">保存</button>
            </div>
        </div>
    </div>

    <div id="apiModal" class="modal">
        <div class="modal-content">
            <h3 id="apiModalTitle">新增API权限</h3>
            <input type="hidden" id="apiId">
            <div class="form-group">
                <label>权限名称</label>
                <input type="text" id="apiName">
            </div>
            <div class="form-group">
                <label>权限编码</label>
                <input type="text" id="apiCode">
            </div>
            <div class="form-group">
                <label>URL</label>
                <input type="text" id="apiUrl">
            </div>
            <div class="form-group">
                <label>请求方法</label>
                <select id="apiMethod">
                    <option value="GET">GET</option>
                    <option value="POST">POST</option>
                    <option value="PUT">PUT</option>
                    <option value="DELETE">DELETE</option>
                </select>
            </div>
            <div class="form-group">
                <label>所属菜单</label>
                <select id="apiMenuId"></select>
            </div>
            <div class="form-group">
                <label>描述</label>
                <textarea id="apiDesc" rows="3"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('apiModal')">取消</button>
                <button class="btn btn-primary" onclick="saveApi()">保存</button>
            </div>
        </div>
    </div>

    <script>
        var roles = [];
        var orgs = [];
        var menus = [];
        var apis = [];

        document.querySelectorAll('.sidebar li').forEach(function(li) {
            li.addEventListener('click', function() {
                document.querySelectorAll('.sidebar li').forEach(function(l) { l.classList.remove('active'); });
                document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
                this.classList.add('active');
                var page = this.getAttribute('data-page');
                document.getElementById(page + 'Page').classList.add('active');
                if (page === 'user') loadUsers();
                else if (page === 'role') loadRoles();
                else if (page === 'org') loadOrgs();
                else if (page === 'menu') loadMenus();
                else if (page === 'api') loadApis();
            });
        });

        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
        }

        function loadUsers() {
            Promise.all([
                fetch('/api/user/list').then(r => r.json()),
                fetch('/api/role/list').then(r => r.json()),
                fetch('/api/org/list').then(r => r.json())
            ]).then(function(results) {
                var users = results[0].data || [];
                roles = results[1].data || [];
                orgs = results[2].data || [];
                var tbody = document.getElementById('userTable');
                tbody.innerHTML = '';
                users.forEach(function(user) {
                    var roleName = '';
                    var orgName = '';
                    roles.forEach(function(r) { if (r.id === user.roleId) roleName = r.name; });
                    orgs.forEach(function(o) { if (o.id === user.organizationId) orgName = o.name; });
                    tbody.innerHTML += '<tr>' +
                        '<td>' + user.id + '</td>' +
                        '<td>' + user.username + '</td>' +
                        '<td>' + (user.realName || '') + '</td>' +
                        '<td>' + (user.email || '') + '</td>' +
                        '<td>' + (user.phone || '') + '</td>' +
                        '<td>' + (user.userType === 1 ? '管理员' : '普通用户') + '</td>' +
                        '<td>' + roleName + '</td>' +
                        '<td>' + orgName + '</td>' +
                        '<td>' +
                            '<button class="btn btn-sm btn-primary" onclick="editUser(' + user.id + ')">编辑</button> ' +
                            '<button class="btn btn-sm btn-danger" onclick="deleteUser(' + user.id + ')">删除</button>' +
                        '</td></tr>';
                });
            });
        }

        function loadRoles() {
            fetch('/api/role/list').then(r => r.json()).then(function(result) {
                roles = result.data || [];
                var tbody = document.getElementById('roleTable');
                tbody.innerHTML = '';
                roles.forEach(function(role) {
                    tbody.innerHTML += '<tr>' +
                        '<td>' + role.id + '</td>' +
                        '<td>' + role.name + '</td>' +
                        '<td>' + role.code + '</td>' +
                        '<td>' + (role.description || '') + '</td>' +
                        '<td>' +
                            '<button class="btn btn-sm btn-primary" onclick="editRole(' + role.id + ')">编辑</button> ' +
                            '<button class="btn btn-sm btn-warning" onclick="showRoleBindModal(' + role.id + ', \'' + role.name + '\')">绑定权限</button> ' +
                            '<button class="btn btn-sm btn-danger" onclick="deleteRole(' + role.id + ')">删除</button>' +
                        '</td></tr>';
                });
            });
        }

        function loadOrgs() {
            fetch('/api/org/list').then(r => r.json()).then(function(result) {
                orgs = result.data || [];
                var tbody = document.getElementById('orgTable');
                tbody.innerHTML = '';
                orgs.forEach(function(org) {
                    tbody.innerHTML += '<tr>' +
                        '<td>' + org.id + '</td>' +
                        '<td>' + org.name + '</td>' +
                        '<td>' + org.code + '</td>' +
                        '<td>' + (org.level || 1) + '</td>' +
                        '<td>' + (org.description || '') + '</td>' +
                        '<td>' +
                            '<button class="btn btn-sm btn-primary" onclick="editOrg(' + org.id + ')">编辑</button> ' +
                            '<button class="btn btn-sm btn-danger" onclick="deleteOrg(' + org.id + ')">删除</button>' +
                        '</td></tr>';
                });
            });
        }

        function loadMenus() {
            fetch('/api/menu/list').then(r => r.json()).then(function(result) {
                menus = result.data || [];
                var tbody = document.getElementById('menuTable');
                tbody.innerHTML = '';
                menus.forEach(function(menu) {
                    var typeClass = menu.menuType === 0 ? 'menu-type-menu' : 'menu-type-button';
                    var typeText = menu.menuType === 0 ? '菜单' : '按钮';
                    var statusClass = menu.status === 1 ? 'status-enabled' : 'status-disabled';
                    var statusText = menu.status === 1 ? '启用' : '禁用';
                    tbody.innerHTML += '<tr>' +
                        '<td>' + menu.id + '</td>' +
                        '<td>' + menu.name + '</td>' +
                        '<td>' + menu.code + '</td>' +
                        '<td>' + (menu.path || '') + '</td>' +
                        '<td><span class="menu-type-tag ' + typeClass + '">' + typeText + '</span></td>' +
                        '<td>' + (menu.sort || 0) + '</td>' +
                        '<td><span class="status-tag ' + statusClass + '">' + statusText + '</span></td>' +
                        '<td>' +
                            '<button class="btn btn-sm btn-primary" onclick="editMenu(' + menu.id + ')">编辑</button> ' +
                            '<button class="btn btn-sm btn-danger" onclick="deleteMenu(' + menu.id + ')">删除</button>' +
                        '</td></tr>';
                });
            });
        }

        function loadApis() {
            Promise.all([
                fetch('/api/permission/list').then(r => r.json()),
                fetch('/api/menu/list').then(r => r.json())
            ]).then(function(results) {
                apis = results[0].data || [];
                menus = results[1].data || [];
                var tbody = document.getElementById('apiTable');
                tbody.innerHTML = '';
                apis.forEach(function(api) {
                    var menuName = '';
                    menus.forEach(function(m) { if (m.id === api.menuId) menuName = m.name; });
                    tbody.innerHTML += '<tr>' +
                        '<td>' + api.id + '</td>' +
                        '<td>' + api.name + '</td>' +
                        '<td>' + api.code + '</td>' +
                        '<td>' + api.url + '</td>' +
                        '<td>' + api.method + '</td>' +
                        '<td>' + menuName + '</td>' +
                        '<td>' +
                            '<button class="btn btn-sm btn-primary" onclick="editApi(' + api.id + ')">编辑</button> ' +
                            '<button class="btn btn-sm btn-danger" onclick="deleteApi(' + api.id + ')">删除</button>' +
                        '</td></tr>';
                });
            });
        }

        function showUserModal(id) {
            document.getElementById('userModalTitle').textContent = id ? '编辑用户' : '新增用户';
            document.getElementById('userId').value = id || '';
            document.getElementById('userUsername').value = '';
            document.getElementById('userPassword').value = '';
            document.getElementById('userRealName').value = '';
            document.getElementById('userEmail').value = '';
            document.getElementById('userPhone').value = '';
            document.getElementById('userTypeSelect').value = '0';
            
            var roleSelect = document.getElementById('userRole');
            roleSelect.innerHTML = '<option value="">请选择角色</option>';
            roles.forEach(function(r) { roleSelect.innerHTML += '<option value="' + r.id + '">' + r.name + '</option>'; });
            
            var orgSelect = document.getElementById('userOrg');
            orgSelect.innerHTML = '<option value="">请选择组织机构</option>';
            orgs.forEach(function(o) { orgSelect.innerHTML += '<option value="' + o.id + '">' + o.name + '</option>'; });
            
            if (id) {
                fetch('/api/user/' + id).then(r => r.json()).then(function(result) {
                    var user = result.data;
                    document.getElementById('userUsername').value = user.username;
                    document.getElementById('userRealName').value = user.realName || '';
                    document.getElementById('userEmail').value = user.email || '';
                    document.getElementById('userPhone').value = user.phone || '';
                    document.getElementById('userTypeSelect').value = user.userType;

        function showRoleBindModal(roleId, roleName) {
            document.getElementById('roleBindId').value = roleId;
            document.getElementById('roleBindName').textContent = '角色: ' + roleName;
            document.getElementById('roleBindModalTitle').textContent = '角色权限绑定 - ' + roleName;
            
            Promise.all([
                fetch('/api/menu/list').then(r => r.json()),
                fetch('/api/permission/list').then(r => r.json()),
                fetch('/api/org/list').then(r => r.json()),
                fetch('/api/role/' + roleId + '/menus').then(r => r.json()),
                fetch('/api/role/' + roleId + '/apis').then(r => r.json()),
                fetch('/api/role/' + roleId + '/organizations').then(r => r.json())
            ]).then(function(results) {
                var allMenus = results[0].data || [];
                var allApis = results[1].data || [];
                var allOrgs = results[2].data || [];
                var roleMenus = results[3].data || [];
                var roleApis = results[4].data || [];
                var roleOrgs = results[5].data || [];
                
                var menuGroup = document.getElementById('menuCheckboxGroup');
                menuGroup.innerHTML = '';
                allMenus.forEach(function(m) {
                    var checked = roleMenus.indexOf(m.id) >= 0 ? 'checked' : '';
                    menuGroup.innerHTML += '<div class="checkbox-item"><input type="checkbox" id="menu_' + m.id + '" value="' + m.id + '" ' + checked + '><label for="menu_' + m.id + '">' + m.name + ' (' + m.code + ')</label></div>';
                });
                
                var apiGroup = document.getElementById('apiCheckboxGroup');
                apiGroup.innerHTML = '';
                allApis.forEach(function(a) {
                    var checked = roleApis.indexOf(a.id) >= 0 ? 'checked' : '';
                    apiGroup.innerHTML += '<div class="checkbox-item"><input type="checkbox" id="api_' + a.id + '" value="' + a.id + '" ' + checked + '><label for="api_' + a.id + '">' + a.name + ' (' + a.code + ')</label></div>';
                });
                
                var orgGroup = document.getElementById('orgCheckboxGroup');
                orgGroup.innerHTML = '';
                allOrgs.forEach(function(o) {
                    var checked = roleOrgs.indexOf(o.id) >= 0 ? 'checked' : '';
                    orgGroup.innerHTML += '<div class="checkbox-item"><input type="checkbox" id="org_' + o.id + '" value="' + o.id + '" ' + checked + '><label for="org_' + o.id + '">' + o.name + ' (' + o.code + ')</label></div>';
                });
                
                document.getElementById('roleBindModal').classList.add('show');
            });
        }

        function saveRoleBind() {
            var roleId = document.getElementById('roleBindId').value;
            
            var menuIds = [];
            document.querySelectorAll('#menuCheckboxGroup input:checked').forEach(function(cb) {
                menuIds.push(parseInt(cb.value));
            });
            
            var apiIds = [];
            document.querySelectorAll('#apiCheckboxGroup input:checked').forEach(function(cb) {
                apiIds.push(parseInt(cb.value));
            });
            
            var orgIds = [];
            document.querySelectorAll('#orgCheckboxGroup input:checked').forEach(function(cb) {
                orgIds.push(parseInt(cb.value));
            });
            
            Promise.all([
                fetch('/api/role/' + roleId + '/menus', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(menuIds)
                }).then(r => r.json()),
                fetch('/api/role/' + roleId + '/apis', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(apiIds)
                }).then(r => r.json()),
                fetch('/api/role/' + roleId + '/organizations', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(orgIds)
                }).then(r => r.json())
            ]).then(function(results) {
                var success = true;
                results.forEach(function(r) {
                    if (r.code !== 200) success = false;
                });
                if (success) {
                    closeModal('roleBindModal');
                    alert('绑定成功');
                } else {
                    alert('部分绑定失败');
                }
            });
        }
